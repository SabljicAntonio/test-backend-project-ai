spring:
  application:
    name: backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/weather}
    username: ${DB_USERNAME:weather}
    password: ${DB_PASSWORD:weather}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
  web:
    resources:
      cache:
        period: 3600

jwt:
  secret: ${JWT_SECRET:change-this-secret-in-production-min-32-chars!!}
  expiration-ms: 86400000

server:
  port: 8080
